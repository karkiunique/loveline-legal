<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loveline — Legal</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fdf5ef;
      color: #3a2a20;
    }
    .card {
      text-align: center;
      padding: 48px 36px;
      max-width: 420px;
    }
    h1 {
      font-family: Georgia, "Playfair Display", serif;
      font-size: 40px;
      margin: 0 0 8px;
      color: #c87878;
    }
    p { color: #8a6f63; margin: 0 0 28px; }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    a {
      display: block;
      padding: 14px 20px;
      background: #fff;
      border: 1px solid #eadcd1;
      border-radius: 14px;
      text-decoration: none;
      color: #3a2a20;
      font-weight: 600;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    a:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(200, 120, 120, 0.18);
      border-color: #c87878;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Loveline</h1>
    <p>Legal documents</p>
    <div class="links">
      <a href="./privacy.html">Privacy Policy</a>
      <a href="./terms.html">Terms of Service</a>
    </div>
  </div>
</body>
</html>
